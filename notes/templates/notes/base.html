<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Notes App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f6f8; color: #222; }
        header { background: #20364f; color: white; padding: 18px 28px; }
        main { max-width: 920px; margin: 30px auto; background: white; padding: 26px; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.08); }
        a { color: #145da0; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .button { display: inline-block; background: #145da0; color: white; padding: 9px 14px; border-radius: 6px; border: 0; cursor: pointer; }
        .button.danger { background: #a01414; }
        .note-card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin: 14px 0; background: #fbfbfb; }
        .muted { color: #666; font-size: 0.92em; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0 16px; border: 1px solid #bbb; border-radius: 6px; box-sizing: border-box; }
        .top-actions { display: flex; justify-content: space-between; gap: 10px; align-items: center; flex-wrap: wrap; }
    </style>
</head>
<body>
    <header>
        <h1>Student Notes App</h1>
        <p>Lesson 12 Security Audit and Hardening Demo</p>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
